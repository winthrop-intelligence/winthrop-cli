name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -eu
          version="${GITHUB_REF_NAME:-dev}"
          commit="${GITHUB_SHA}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          binary="winthrop"
          if [ "${GOOS}" = "windows" ]; then
            binary="winthrop.exe"
          fi
          mkdir -p "dist/winthrop_${version}_${GOOS}_${GOARCH}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/winthrop-intelligence/winthrop-cli/internal/cli.version=${version} -X github.com/winthrop-intelligence/winthrop-cli/internal/cli.commit=${commit} -X github.com/winthrop-intelligence/winthrop-cli/internal/cli.date=${build_date}" \
            -o "dist/winthrop_${version}_${GOOS}_${GOARCH}/${binary}" \
            ./cmd/winthrop
          cp README.md "dist/winthrop_${version}_${GOOS}_${GOARCH}/README.md"

      - name: Archive artifact
        run: |
          set -eu
          version="${GITHUB_REF_NAME:-dev}"
          name="winthrop_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "${name}.zip" "${name}"
          else
            tar -czf "${name}.tar.gz" "${name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: winthrop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/winthrop_*_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -eu
          cd dist
          sha256sum winthrop_* > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/winthrop_*
            dist/checksums.txt
